{{- if and .Values.scheduler.kubeScheduler.enabled (not .Values.dra.enabled) -}}
{{- $k8sMinor := regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "" | int -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hami-vgpu.scheduler" . }}
  namespace: {{ include "hami-vgpu.namespace" . }}
  labels:
    app.kubernetes.io/component: hami-scheduler
    {{- include "hami-vgpu.labels" . | nindent 4 }}
{{- $defaultPrefix := ternary "https://127.0.0.1:443" "http://127.0.0.1:80" .Values.scheduler.admissionWebhook.enabled }}
{{- $urlPrefix := default $defaultPrefix .Values.scheduler.extender.urlPrefixOverride }}
{{- $useHTTPS := hasPrefix "https://" $urlPrefix }}
data:
{{- if ge $k8sMinor 22 }}
  {{/* K8s >= 1.22: Use KubeSchedulerConfiguration API */}}
  config.yaml: |
    {{- if gt $k8sMinor 25 }}
    apiVersion: kubescheduler.config.k8s.io/v1
    {{- else }}
    apiVersion: kubescheduler.config.k8s.io/v1beta2
    {{- end }}
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: {{ .Values.scheduler.leaderElect }}
      resourceName: {{ .Values.schedulerName | quote }}
      resourceNamespace: {{ include "hami-vgpu.namespace" . | quote }}
    profiles:
    - schedulerName: {{ .Values.schedulerName }}
    extenders:
    - urlPrefix: {{ $urlPrefix | quote }}
      enableHTTPS: {{ $useHTTPS }}
    {{- if $useHTTPS }}
      tlsConfig:
        insecure: true
    {{- end }}
      filterVerb: filter
      bindVerb: bind
      nodeCacheCapable: true
      weight: 1
      httpTimeout: 30s
      managedResources:
      {{- include "hami-vgpu.scheduler.managedResources" . | nindent 6 }}
{{- else }}
  {{/* K8s < 1.22: Use legacy Policy API */}}
  config.json: |
    {
        "kind": "Policy",
        "apiVersion": "v1",
        "extenders": [
            {
                "urlPrefix": {{ $urlPrefix | quote }},
                "enableHttps": {{ $useHTTPS }},
                {{- if $useHTTPS }}
                "tlsConfig": {
                    "insecure": true
                },
                {{- end }}
                "filterVerb": "filter",
                "bindVerb": "bind",
                "weight": 1,
                "nodeCacheCapable": true,
                "httpTimeout": 30000000000,
                "managedResources": {{ include "hami-vgpu.scheduler.managedResources" . | fromYamlArray | toJson }},
                "ignoreable": false
            }
        ]
    }
{{- end }}
{{- end }}
